<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Kuliner - TitipAja</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--gray-light); }
    .kuliner-container {
      max-width: 900px; margin: 0 auto; padding: 90px 20px 60px;
    }
    .kuliner-back {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--blue); text-decoration: none; font-weight: 600;
      margin-bottom: 28px; transition: gap .2s;
    }
    .kuliner-back:hover { gap: 12px; }
    
    .kuliner-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden;
      animation: slideUp .4s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .kuliner-header-img {
      width: 100%; height: 320px; object-fit: cover;
    }
    
    .kuliner-body {
      padding: 40px;
    }
    .kuliner-title {
      font-family: 'Nunito', sans-serif; font-size: 2rem;
      font-weight: 900; margin-bottom: 12px; color: var(--text);
    }
    .kuliner-desc {
      color: var(--gray); font-size: 1rem; line-height: 1.7;
      margin-bottom: 40px; max-width: 500px;
    }
    
    .kuliner-gallery {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px; margin-bottom: 40px;
    }
    .gallery-item {
      position: relative; overflow: hidden; border-radius: 12px;
      height: 200px;
    }
    .image-preview {
      border: none; background: transparent; width: 100%; height: 100%; padding: 0;
      cursor: pointer; display: block;
    }
    .image-preview img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .3s;
      display: block;
    }
    .gallery-item:hover img,
    .kuliner-header-btn:hover img { transform: scale(1.08); }

    .lightbox-overlay {
      display: none; position: fixed; inset: 0; z-index: 1200;
      background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
      padding: 24px;
    }
    .lightbox-overlay.active { display: flex; }
    .lightbox-img {
      max-width: 95vw; max-height: 95vh; width: auto; height: auto;
      border-radius: 18px; box-shadow: 0 24px 70px rgba(0,0,0,0.35);
    }
    .lightbox-close {
      position: absolute; top: 16px; right: 16px; z-index: 1210;
      border: none; background: rgba(255,255,255,0.14); color: #fff;
      width: 44px; height: 44px; border-radius: 50%;
      font-size: 1.5rem; cursor: pointer; transition: background .2s;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.22); }
    
    .kuliner-actions {
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .btn-order {
      background: var(--blue); color: #fff;
      padding: 14px 36px; border-radius: 50px;
      font-weight: 700; font-size: 1rem; text-decoration: none;
      box-shadow: 0 6px 20px rgba(30,111,217,0.22);
      transition: all .2s;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .btn-order:hover {
      background: var(--blue-dark); transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(30,111,217,0.3);
    }
    
    @media (max-width: 700px) {
      .kuliner-container { padding: 70px 16px 32px; }
      .kuliner-body { padding: 24px; }
      .kuliner-title { font-size: 1.5rem; }
      .kuliner-gallery { grid-template-columns: 1fr; gap: 14px; }
      .gallery-item { height: 280px; }
      .kuliner-header-img { height: 260px; }
    }
  </style>
</head>
<body>
  <!-- NAV -->
  <nav>
    <div class="nav-brand">
      <a class="nav-logo" href="index.html">
        <img src="logo.png" alt="TitipAja">
      </a>
      <h1 class="nav-title"><span class="blue">Titip</span><span class="orange">Aja</span></h1>
    </div>
    <ul class="nav-links">
      <li><a href="index.html#layanan">Layanan</a></li>
      <li><a href="index.html#cara-pesan">Cara Pesan</a></li>
      <li><a href="index.html#mitra">Jadi Mitra</a></li>
    </ul>
    <a class="nav-cta" href="https://wa.me/6281234567890" target="_blank">📲 Pesan Sekarang</a>
  </nav>

  <div class="kuliner-container">
    <a href="index.html#layanan" class="kuliner-back">← Kembali</a>
    
    <div class="kuliner-card">
        <h1 class="kuliner-title">🍕 Warung Makan Favorit</h1>
        <button type="button" class="image-preview kuliner-header-btn" data-src="foto_toko/seblak.jpg" aria-label="Lihat foto toko penuh">
          <img src="foto_toko/seblak.jpg" alt="Foto Toko" class="kuliner-header-img">
        </button>
      
      <div class="kuliner-body">
        
        <p class="kuliner-desc">daftar menu</p>
        
        <div class="kuliner-gallery">
          <div class="gallery-item">
            <button type="button" class="image-preview" data-src="menu/seblak1.jpg" aria-label="Lihat menu satu penuh">
              <img src="menu/seblak1.jpg" alt="Menu 1">
            </button>
          </div>
        </div>

        <div class="kuliner-actions">
          <a href="https://wa.me/6281234567890?text=Halo%20TitipAja%2C%20saya%20ingin%20pesan%20dari%20Warung%20Makan%20Favorit" target="_blank" class="btn-order">
            💬 Pesan Sekarang
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- LIGHTBOX OVERLAY -->
  <div id="lightboxOverlay" class="lightbox-overlay" onclick="closeLightbox(event)">
    <button class="lightbox-close" aria-label="Tutup gambar">✕</button>
    <img id="lightboxImage" class="lightbox-img" src="" alt="Gambar besar">
  </div>

  <!-- WhatsApp Float -->
  <a class="wa-float" href="https://wa.me/6281234567890" target="_blank" title="Chat WhatsApp">💬</a>

  <script src="script.js"></script>
</body>
</html>
